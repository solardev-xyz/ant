			shellPath = /bin/bash;
			shellScript = "# Cross-compile crates/ant-ffi (with the `chain` feature, which the\n# Storage tab needs to read the account's plan from Gnosis) for the\n# slice this build targets. The xtask prints libant_ffi.a's path on the\n# last line; we ignore it because LIBRARY_SEARCH_PATHS points at the\n# same well-known location.\nset -euo pipefail\n\ncd \"$SRCROOT/../..\"\n\nPROFILE=release\nif [ \"${CONFIGURATION:-Release}\" = \"Debug\" ]; then\n    PROFILE=debug\nfi\n\nexport PATH=\"$HOME/.cargo/bin:/usr/local/bin:/opt/homebrew/bin:$PATH\"\n\nif [ \"${PLATFORM_NAME:-iphonesimulator}\" = \"iphoneos\" ]; then\n    cargo xtask build-ios-device --profile \"$PROFILE\" --features chain\nelse\n    ARCH=aarch64\n    host_arch=$(uname -m)\n    if [ \"${ARCHS:-arm64}\" = \"x86_64\" ]; then\n        ARCH=x86_64\n    elif [ \"${ARCHS:-arm64}\" = \"arm64\" ]; then\n        ARCH=aarch64\n    else\n        case \"$host_arch\" in\n            arm64) ARCH=aarch64 ;;\n            x86_64) ARCH=x86_64 ;;\n        esac\n    fi\n    cargo xtask build-ios-sim --arch \"$ARCH\" --profile \"$PROFILE\" --features chain\nfi\n";
