			shellScript = "# Cross-compile crates/ant-ffi for the simulator slice this build\n# is targeting. The xtask prints the absolute path of libant_ffi.a\n# on the last line; we ignore the output because the Xcode library\n# search path points at the same well-known location.\nset -euo pipefail\n\ncd \"$SRCROOT/../..\"\n\nPROFILE=release\nif [ \"${CONFIGURATION:-Release}\" = \"Debug\" ]; then\n    PROFILE=debug\nfi\n\n# Xcode sets ARCHS for the archs this build targets. For a simulator\n# build that can be \"arm64\", \"x86_64\", or \"arm64 x86_64\". We build\n# one rust slice per build invocation; prefer the host arch when\n# both are requested so a plain ⌘B on Apple Silicon doesn't sit\n# through an unnecessary x86_64 cross-compile.\nARCH=aarch64\nhost_arch=$(uname -m)\nif [ \"${ARCHS:-arm64}\" = \"x86_64\" ]; then\n    ARCH=x86_64\nelif [ \"${ARCHS:-arm64}\" = \"arm64\" ]; then\n    ARCH=aarch64\nelse\n    case \"$host_arch\" in\n        arm64) ARCH=aarch64 ;;\n        x86_64) ARCH=x86_64 ;;\n    esac\nfi\n\nexport PATH=\"$HOME/.cargo/bin:/usr/local/bin:/opt/homebrew/bin:$PATH\"\n\ncargo xtask build-ios-sim --arch \"$ARCH\" --profile \"$PROFILE\"\n";
