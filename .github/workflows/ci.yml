# Per-PR + per-merge-to-main CI for the ant workspace.
#
# Three parallel jobs, each modelling a piece of PLAN.md § 3
# ("Per-PR (fast)" — clippy + rustfmt + cargo test on x86_64 Linux,
#  cross-compile smoke-build on aarch64-linux-android and
#  aarch64-apple-ios). When the proper Phase-4 mobile artefact lands
# this workflow grows release-build + bundletool size-check jobs;
# until then the smoke jobs only validate that the cross-compile
# completes — they don't run the binary.
#
# The pre-commit-config.yaml at repo root is purely advisory; this
# workflow is the actual enforcement point. If you flip a clippy lint
# from warn to deny, this is the file you'll see go red.

name: CI

on:
  push:
    branches: [main]
  pull_request:

# Latest pushed commit on a PR cancels still-running CI for older
# pushes on the same branch. Keeps the queue snappy when an author
# fixes a typo and re-pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  # `cargo xtask build-android-*` reads this; matches the
  # `examples/android-download/app/build.gradle.kts` minSdk = 26.
  ANDROID_NDK_API_LEVEL: "26"

jobs:
  # -------------------------------------------------------------------
  # Lint + test on Linux. The fast path the PR template's "did you run
  # checks?" question is asking about.
  # -------------------------------------------------------------------
  lint-and-test:
    name: fmt + clippy + test (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # `dtolnay/rust-toolchain` is the de-facto stable replacement
        # for the deprecated `actions-rs/toolchain`. We pin to stable
        # because rust-toolchain.toml says `channel = "stable"` —
        # bumping that locally without bumping the runner here would
        # produce a CI-vs-developer drift.
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        # Cuts cold CI from ~6 min to ~2 min on a clean lockfile.
        uses: Swatinem/rust-cache@v2
        with:
          # Bucket by job so the size-budget runner doesn't share a
          # cache with the lint runner — different feature combos
          # produce different intermediate artifacts.
          shared-key: lint-and-test

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo clippy (ant-ffi with jni feature)
        # The Android JNI surface is gated behind a default-off
        # feature; without this step regressions in `src/jni.rs`
        # would only surface when an Android cross-compile fires
        # in the next job, doubling debug latency.
        run: cargo clippy -p ant-ffi --features jni --all-targets -- -D warnings

      - name: cargo test (lib only)
        # Lib tests cover the unit-test surface (BMT, joiner,
        # mantaray, parse_reference). Integration tests against
        # a local bee container live behind a separate workflow
        # we'll add when the bee Docker image stops drifting.
        run: cargo test --workspace --lib

  # -------------------------------------------------------------------
  # Android cross-compile smoke. Confirms `crates/ant-ffi/src/jni.rs`
  # links against the NDK and produces a `libant_ffi.so` that has the
  # expected Java_… symbols.
  # -------------------------------------------------------------------
  android-smoke:
    name: cross-compile aarch64-linux-android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # rustup adds the cross-target the Cargo.toml needs but
          # rust-cache below also keys on it, so changing this list
          # invalidates the cache.
          targets: aarch64-linux-android

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: android-arm64

      - name: Set up Android NDK
        # `setup-android` is GitHub's blessed setup action for the
        # Android SDK / NDK / cmdline-tools and handles license
        # acceptance + sdkmanager install in one step. Pinning the
        # NDK version so reproducible cross-builds don't drift when
        # Google ships a new minor — bump in lock-step with what
        # local devs install.
        uses: android-actions/setup-android@v3
        with:
          packages: ndk;27.2.12479018

      - name: Export ANDROID_NDK_HOME
        # `setup-android` sets ANDROID_HOME but not ANDROID_NDK_HOME;
        # `cargo-ndk` reads the latter. Doing this in a separate
        # step (rather than inline in the build) keeps the env
        # available to subsequent steps without `&&` chains.
        run: echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install cargo-ndk
        # Ditto the NDK version pin: matches what `xtask` is tested
        # against locally and keeps the toolchain-driven warnings
        # under our control.
        run: cargo install cargo-ndk --version 4.1.2 --locked

      - name: cargo xtask build-android-arm64
        run: cargo xtask build-android-arm64

      - name: Verify exported JNI symbols
        # Smoke check that the `Java_…_native…` symbols actually made
        # it into the .so. A regression here would mean either the
        # `jni` feature didn't get switched on (look at xtask) or
        # R8/strip ate them (look at proguard-rules.pro). nm is part
        # of the LLVM bin shipped with the NDK.
        run: |
          set -euxo pipefail
          NM="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-nm"
          SO="target/aarch64-linux-android/release/libant_ffi.so"
          test -f "$SO"
          "$NM" -D --defined-only "$SO" \
            | grep -E '^[[:xdigit:]]+ T Java_at_vibing_ant_downloadsmoke_AntNode_native(Init|Download|PeerCount|AgentString|DownloadProgress|CancelDownload|Shutdown)$' \
            | sort -u > /tmp/android-symbols.txt
          actual=$(wc -l < /tmp/android-symbols.txt)
          if [ "$actual" -ne 7 ]; then
            echo "expected 7 Java_…_native… symbols, found $actual:" >&2
            cat /tmp/android-symbols.txt >&2
            exit 1
          fi
          ls -lh "$SO"

  # -------------------------------------------------------------------
  # iOS cross-compile smoke. The macOS runner's the bottleneck on the
  # whole CI matrix (15 min queueing during business hours), so we
  # keep it minimal: just confirm the simulator slice cross-compiles.
  # The device slice + xcodebuild lives behind a release tag.
  # -------------------------------------------------------------------
  ios-smoke:
    name: cross-compile aarch64-apple-ios-sim
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim
          # `llvm-tools-preview` ships rustc's matching `llvm-nm` in
          # `$(rustc --print sysroot)/lib/rustlib/<host>/bin/`. We
          # need it because Xcode's bundled `nm` lags rustc's LLVM
          # version (LLVM 17 vs rustc-1.95.0's LLVM 22) and chokes
          # on newer bitcode attribute kinds with
          #   "Unknown attribute kind (102) (Producer:
          #    'LLVM22.1.2-rust-1.95.0-stable' Reader:
          #    'LLVM APPLE_1_1500.3.9.4_0')"
          # Using llvm-nm from the Rust toolchain sidesteps the
          # version mismatch entirely.
          components: llvm-tools-preview

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ios-sim

      - name: cargo xtask build-ios-sim
        run: cargo xtask build-ios-sim

      - name: Verify libant_ffi.a exists and contains ant_init
        run: |
          set -euxo pipefail
          AR="target/aarch64-apple-ios-sim/release/libant_ffi.a"
          test -f "$AR"
          ls -lh "$AR"
          # Use rustc's bundled llvm-nm — see the toolchain step's
          # comment for why Xcode's `nm` is unusable on macos-14
          # runners. Path resolution stays portable across Intel /
          # Apple-Silicon hosts via `rustc -vV`.
          HOST_TRIPLE="$(rustc -vV | awk '/^host:/ {print $2}')"
          LLVM_NM="$(rustc --print sysroot)/lib/rustlib/$HOST_TRIPLE/bin/llvm-nm"
          test -x "$LLVM_NM"
          # ant_init is the simplest smoke — if it's missing every
          # downstream symbol is too, and the Xcode link step would
          # fail with "Undefined symbols for architecture arm64".
          if ! "$LLVM_NM" "$AR" 2>/dev/null | grep -E '_ant_init$' >/dev/null; then
            echo "ant_init symbol not found in $AR"
            echo "--- first 30 lines of llvm-nm output ---"
            "$LLVM_NM" "$AR" 2>&1 | head -30 || true
            echo "--- lines containing 'ant' ---"
            "$LLVM_NM" "$AR" 2>/dev/null | grep ant | head -10 || true
            exit 1
          fi
